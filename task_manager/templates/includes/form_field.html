{% load i18n %}

<div class="col-12 mb-3">
  <div class="form-group{% if field.errors %} is-invalid{% endif %}">
    <label for="{{ field.id_for_label }}" class="form-label text-light">
      {{ field.label }}
      {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
    </label>

    {{ field }}

    {% if field.help_text %}
    <div class="form-text text-light text-opacity-50 mt-1">
      {{ field.help_text }}
    </div>
    {% endif %}

    {% if field.errors %}
    <div class="invalid-feedback d-block">
      {% for error in field.errors %}
        {{ error }}
      {% endfor %}
    </div>
    {% endif %}
  </div>
</div>
